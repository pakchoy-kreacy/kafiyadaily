<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - Toko Cantik</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body style="background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; min-height: 100vh;">
  <div class="checkout-section" style="max-width: 400px; width: 100%; margin: 1rem;">
    <h1 class="text-center mb-3">Admin Login</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%;">
        Login
      </button>
    </form>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
